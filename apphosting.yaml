# Firebase App Hosting configuration.
# Deploy: firebase apphosting:backends:create (connect this GitHub repo), or
#         firebase deploy --only apphosting once the backend exists.
runConfig:
  minInstances: 1        # reminders/digest cron must always be running
  maxInstances: 3
  memoryMiB: 512
  concurrency: 80

env:
  - variable: SERVE_WEB
    value: "true"
  - variable: RUN_WORKER
    value: "true"
  - variable: TRUST_PROXY
    value: "true"
  - variable: COOKIE_SECURE
    value: "true"
  # Set these as secrets in the Firebase console (App Hosting → backend → Settings):
  #   DATABASE_URL       postgres connection string (Neon or Cloud SQL)
  #   SESSION_SECRET     openssl rand -base64 32
  #   ENCRYPTION_KEY     openssl rand -base64 32
  #   API_BASE_URL / WEB_BASE_URL   the backend's public URL
  #   SMTP_HOST / SMTP_PORT / SMTP_FROM (+ provider creds)  for reminder emails
  #   ANTHROPIC_API_KEY  optional — Claude-written morning digests
  - variable: DATABASE_URL
    secret: DATABASE_URL
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
  - variable: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY
