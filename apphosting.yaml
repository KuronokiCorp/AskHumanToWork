# Firebase App Hosting configuration.
# Deploy: firebase apphosting:backends:create (connect this GitHub repo), or
#         firebase deploy --only apphosting once the backend exists.
runConfig:
  # CEO decision 22 Jul 2026: scale-to-zero — the always-on instance was ~90% of the
  # GCP bill's idle cost. CONSEQUENCE: the in-process reminders/digest cron only runs
  # while an instance is awake; until the Cloud Scheduler refactor (see BACKLOG.md #1)
  # reminders may be delayed when the service is scaled to zero.
  minInstances: 0
  maxInstances: 3
  memoryMiB: 512
  concurrency: 80

env:
  - variable: SERVE_WEB
    value: "true"
  - variable: RUN_WORKER
    value: "true"
  - variable: TRUST_PROXY
    value: "true"
  - variable: COOKIE_SECURE
    value: "true"
  - variable: API_BASE_URL
    value: "https://askhumantowork--askhumantowork.asia-east1.hosted.app"
  - variable: WEB_BASE_URL
    value: "https://askhumantowork--askhumantowork.asia-east1.hosted.app"
  # Secrets (Cloud Secret Manager, set via `firebase apphosting:secrets:set`):
  #   DATABASE_URL       Supabase session-pooler connection string
  #   SESSION_SECRET / ENCRYPTION_KEY   random 32-byte base64
  # Later: SMTP_HOST/SMTP_PORT/SMTP_FROM (+ creds) for reminder emails,
  #        ANTHROPIC_API_KEY for Claude-written morning digests
  #
  # Per-todo AI assistant — MINIMAX_API_KEY is set (see the secret ref below),
  # so the panel is live. Billing overage stays off until Stripe is wired:
  #   STRIPE_SECRET_KEY   } enable overage past the free allowance; needs a
  #   STRIPE_AI_PRICE_ID  } Billing Meter + metered price created first
  #   STRIPE_WEBHOOK_SECRET
  # Without those, /api/usage reports billingEnabled:false and users are simply
  # cut off at the free allowance rather than billed.
  # Create each with `firebase apphosting:secrets:set NAME` BEFORE adding its
  # `- variable:/secret:` pair below — a reference to a missing secret stops
  # the backend from starting.
  - variable: DATABASE_URL
    secret: DATABASE_URL
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
  - variable: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY
  # Cron tick secret (backlog #1): guards POST /api/internal/cron/tick, which a
  # Cloud Scheduler job calls every ~10 min so reminders/digest stay reliable at
  # minInstances=0. Create the secret AND the Scheduler job at the CEO-approved
  # deploy step — see docs/runbooks/cloud-scheduler.md. Until CRON_SECRET is set
  # the endpoint returns 503 (disabled), so it is safe to ship this ref ahead of
  # the secret existing only if the secret is created before the reference is
  # required; create the secret first, then uncomment the pair below.
  # CRON_SECRET created + IAM-granted 2026-07-24 (CEO-approved release) — ref live:
  - variable: CRON_SECRET
    secret: CRON_SECRET
  - variable: MINIMAX_API_KEY
    secret: MINIMAX_API_KEY
  # Account region must match the key: api.minimax.io and api.minimaxi.com are
  # separate accounts with separate keys, and the wrong pairing fails auth.
  - variable: MINIMAX_BASE_URL
    value: "https://api.minimax.io/v1"
  - variable: MINIMAX_MODEL
    value: "MiniMax-M3"
  # Social sign-in. Both are public values — the anon key is designed to ship to
  # browsers — so they are plain env, not secrets. Supabase only brokers the
  # provider hand-off; the session it leads to is still ours.
  # Enable the providers in Supabase → Authentication → Providers, with
  # redirect URL <WEB_BASE_URL>/auth/callback.
  - variable: SUPABASE_URL
    value: "https://qkswdfvtoozelocwuccf.supabase.co"
  # Modern publishable key (sb_publishable_...) — the drop-in successor to the
  # legacy JWT anon key; the auth endpoints accept it as `apikey` the same way.
  # Google enabled in Supabase 23 Jul 2026; the API only offers providers
  # Supabase reports enabled, so flipping GitHub on later needs no redeploy.
  - variable: SUPABASE_ANON_KEY
    value: "sb_publishable_iAjSRih2v6YUpdB0jqyqUA_gLVzo5N0"
