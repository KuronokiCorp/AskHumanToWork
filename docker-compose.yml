# Deployment / alternative to Homebrew services for local dev.
# Local dev on this machine currently uses `brew services` (postgresql@16, redis, mailpit).
version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: askhumantowork
      POSTGRES_USER: askhumantowork
      POSTGRES_PASSWORD: askhumantowork
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askhumantowork"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  pgdata:
  redisdata:
